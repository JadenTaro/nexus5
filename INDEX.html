<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nexus5 · 探索</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

:root{
  --bg:#15121c;
  --surface:#1e1a28;
  --surface2:#262030;
  --surface3:#322b3f;
  --border:#352d42;
  --text:#f5f2f8;
  --sub:#a89ebb;
  --muted:#665d75;
  --tag-bg:#2a2435;
  --brand:#ff6b6b;
  --brand2:#ffa94d;
  --green:#4ade80;
  --red:#ff5f5f;
  --amber:#fbbf24;
  --radius-lg:20px;
  --radius-md:14px;
  --radius-sm:9px;
  --f-display:'Space Grotesk','Noto Sans TC',sans-serif;
  --f-body:'Noto Sans TC',sans-serif;
  --f-mono:'JetBrains Mono','Noto Sans TC',monospace;
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--f-body);-webkit-font-smoothing:antialiased;overflow:hidden;}

.ambient-bg{
  position:fixed;inset:0;pointer-events:none;
  background-color:var(--bg);
  background-image:
    radial-gradient(circle at 12% 6%, rgba(255,107,107,0.18), transparent 38%),
    radial-gradient(circle at 88% 16%, rgba(77,163,255,0.13), transparent 36%),
    radial-gradient(circle at 50% 100%, rgba(180,122,255,0.11), transparent 42%);
}

/* ── Loading Screen ── */
#loading-screen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;
  transition:opacity .5s ease, visibility .5s ease;
}
#loading-screen.fade-out{opacity:0;visibility:hidden;pointer-events:none;}
.load-ring{
  width:50px;height:50px;border-radius:50%;
  background:conic-gradient(from 0deg, var(--brand), var(--brand2), transparent 80%);
  -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 4px));
  mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 4px));
  animation:loadspin .9s linear infinite;
}
@keyframes loadspin{to{transform:rotate(360deg)}}
.load-text{font-family:var(--f-display);font-size:13px;letter-spacing:.5px;color:var(--sub);font-weight:600;}
.load-text b{font-weight:700;background:linear-gradient(90deg,var(--brand),var(--brand2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}

/* ── Bottom Nav ── */
.nav{
  position:fixed;bottom:0;left:0;right:0;height:64px;
  background:rgba(30,26,40,0.92);backdrop-filter:blur(10px);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;
  z-index:100;padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  color:var(--muted);font-size:10px;font-weight:500;
  background:none;border:none;cursor:pointer;font-family:var(--f-body);
  transition:color .15s;padding:8px 18px;position:relative;
}
.nav-btn .nav-icon{width:20px;height:20px;}
.nav-btn.active{color:var(--brand);}
.nav-dot{
  position:absolute;top:4px;right:10px;width:7px;height:7px;border-radius:50%;
  background:var(--red);display:none;
}
.nav-dot.show{display:block;}

/* ── Top bar ── */
.topbar{
  position:fixed;top:0;left:0;right:0;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:linear-gradient(to bottom,var(--bg) 65%,transparent);
  z-index:100;
}
.topbar-logo{font-family:var(--f-display);font-size:18px;font-weight:700;letter-spacing:-.3px;color:var(--text);}
.topbar-logo b{font-weight:700;background:linear-gradient(120deg,var(--brand),var(--brand2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.topbar-search{
  flex:1;margin:0 12px;background:var(--surface2);border:1px solid var(--border);
  border-radius:11px;display:flex;align-items:center;gap:8px;padding:0 12px;height:36px;cursor:text;
  transition:border-color .15s;
}
.topbar-search:focus-within{border-color:var(--brand);}
.topbar-search input{background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:var(--f-body);width:100%;}
.topbar-search input::placeholder{color:var(--muted);}
.search-icon{color:var(--muted);flex-shrink:0;width:14px;height:14px;}
.topbar-avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:var(--bg);flex-shrink:0;cursor:pointer;font-family:var(--f-display);
}

/* ── Screens ── */
.screen{position:fixed;inset:56px 0 64px;overflow-y:auto;overflow-x:hidden;display:none;-webkit-overflow-scrolling:touch;}
.screen.active{display:block;}

/* ── Explore screen ── */
#screen-explore{padding:10px 16px 20px;}

.intro-banner{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,107,107,0.08);
  border:1px solid rgba(255,107,107,0.22);
  border-radius:var(--radius-md);
  padding:10px 12px;margin-bottom:12px;
  font-size:11.5px;color:var(--sub);line-height:1.5;
}
.intro-banner svg{flex-shrink:0;color:var(--brand);width:18px;height:18px;}
.intro-banner b{color:var(--text);}

.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none;-ms-overflow-style:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;background:var(--surface2);border:1px solid var(--border);color:var(--sub);
  border-radius:20px;padding:6px 14px;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--f-body);
}
.chip:hover{border-color:var(--muted);}
.chip.active{font-weight:700;}

.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.pcard{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  overflow:hidden;cursor:pointer;transition:transform .15s, border-color .15s;
  display:flex;flex-direction:column;animation:rise .25s ease both;
}
.pcard:hover{transform:translateY(-2px);}
@keyframes rise{from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)}}

.pcard-cover{position:relative;width:100%;aspect-ratio:16/10;overflow:visible;}
.pcard-dots{position:absolute;inset:0;background-image:radial-gradient(circle, rgba(255,255,255,0.22) 1px, transparent 1.6px);background-size:14px 14px;opacity:.45;}

.status-badge{
  position:absolute;top:9px;left:9px;z-index:2;
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);
  font-family:var(--f-mono);font-size:9px;font-weight:600;
  padding:4px 8px;border-radius:20px;letter-spacing:.2px;color:var(--text);white-space:nowrap;
}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;animation:breathe 1.6s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(.75);}}
.status-dot.open{background:var(--green);box-shadow:0 0 6px var(--green);}
.status-dot.full{background:var(--red);box-shadow:0 0 6px var(--red);}
.status-dot.seeking{background:var(--amber);box-shadow:0 0 6px var(--amber);}
.status-badge.open{color:var(--green);}
.status-badge.full{color:#ff9b9b;}
.status-badge.seeking{color:var(--amber);}

.btn-like{
  position:absolute;top:8px;right:8px;z-index:2;
  width:27px;height:27px;border-radius:50%;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:#fff;transition:transform .12s;
}
.btn-like svg{width:13px;height:13px;}
.btn-like.liked{color:var(--brand);}
.btn-like:active{transform:scale(0.85);}

.pcard-avatar{
  position:absolute;left:13px;bottom:-20px;z-index:3;
  width:46px;height:46px;border-radius:50%;border:2.5px solid;
  display:flex;align-items:center;justify-content:center;font-size:21px;
}

.pcard-body{padding:28px 12px 13px;}
.pcard-name{font-family:var(--f-display);font-size:14px;font-weight:700;margin-bottom:2px;}
.pcard-role{font-size:11px;color:var(--sub);margin-bottom:7px;line-height:1.3;}
.pcard-ref-chip{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10.5px;color:var(--sub);background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:3px 9px 3px 6px;margin-bottom:9px;max-width:100%;
}
.ref-tag-mono{font-family:var(--f-mono);font-size:8.5px;font-weight:600;letter-spacing:.5px;color:var(--brand);}
.pcard-ref-chip span.name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pcard-tags{display:flex;flex-wrap:wrap;gap:4px;}
.ptag{font-size:10px;background:var(--tag-bg);color:var(--muted);border-radius:6px;padding:2px 7px;font-weight:500;}
.ptag.hot{font-weight:700;}

/* ── Detail sheet ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(2px);}
.sheet-overlay.show{display:flex;}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:0 0 40px;animation:slideUp .25s cubic-bezier(.25,.46,.45,.94);}
@keyframes slideUp{from{transform:translateY(100%)} to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 0;}
.sheet-cover{position:relative;width:100%;height:180px;display:flex;align-items:center;justify-content:center;font-size:64px;margin-top:12px;overflow:hidden;}
.sheet-main{padding:0 20px;}
.sheet-name{font-family:var(--f-display);font-size:21px;font-weight:700;margin-bottom:3px;margin-top:4px;}
.sheet-role{font-size:13px;color:var(--sub);margin-bottom:14px;}
.sheet-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.sheet-tag{font-size:12px;background:var(--tag-bg);color:var(--sub);border-radius:8px;padding:4px 10px;}
.sheet-bio{font-size:13px;color:var(--sub);line-height:1.7;margin-bottom:18px;}
.sheet-section{font-family:var(--f-mono);font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:10px;}
.sheet-works{display:flex;gap:8px;overflow-x:auto;margin-bottom:20px;padding-bottom:4px;scrollbar-width:none;}
.sheet-works::-webkit-scrollbar{display:none;}
.work-thumb{width:78px;height:78px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}

/* referral chain — signature element */
.chain-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 14px 12px;margin-bottom:18px;}
.chain-path{display:flex;align-items:flex-start;gap:0;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.chain-path::-webkit-scrollbar{display:none;}
.chain-col{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;}
.chain-node{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  border:2px solid var(--border);background:var(--surface3);color:var(--sub);font-weight:700;font-family:var(--f-display);
}
.chain-node.you{border-color:var(--muted);color:var(--text);}
.chain-node-label{font-size:9px;font-family:var(--f-mono);color:var(--muted);max-width:42px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chain-line{flex:0 0 18px;height:2px;background:repeating-linear-gradient(90deg, var(--border) 0 5px, transparent 5px 9px);margin:16px 4px 0;}
.chain-hop-tag{display:inline-block;font-family:var(--f-mono);font-size:9.5px;font-weight:600;letter-spacing:.3px;color:var(--brand);background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.25);padding:3px 9px;border-radius:12px;margin-bottom:8px;}
.chain-note{font-size:11.5px;color:var(--sub);line-height:1.5;display:flex;align-items:flex-start;gap:6px;}
.chain-note svg{flex-shrink:0;margin-top:1px;width:13px;height:13px;color:var(--muted);}

.sheet-nav{
  position:absolute;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:50%;
  background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;color:var(--text);cursor:pointer;
  z-index:10;transition:background .15s, opacity .15s;
}
.sheet-nav svg{width:16px;height:16px;}
.sheet-nav:hover{background:rgba(255,107,107,0.3);}
.sheet-nav.prev{left:14px;}
.sheet-nav.next{right:14px;}
.sheet-nav.disabled{opacity:.25;pointer-events:none;}
.sheet-progress{display:flex;gap:4px;justify-content:center;padding:10px 0 0;}
.sheet-progress-dot{width:5px;height:5px;border-radius:50%;background:var(--border);transition:background .2s, width .2s;}
.sheet-progress-dot.active{background:var(--brand);width:14px;border-radius:3px;}

.sheet-actions{display:flex;gap:10px;}
.btn-connect-sheet{
  flex:1;background:linear-gradient(120deg,var(--brand),var(--brand2));color:#1a1420;
  border:none;border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:center;gap:7px;
  font-size:14px;font-weight:700;font-family:var(--f-body);cursor:pointer;transition:opacity .15s;
}
.btn-connect-sheet:hover{opacity:.88;}
.btn-connect-sheet svg{width:16px;height:16px;}
.btn-save-sheet{width:48px;height:48px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .15s;flex-shrink:0;color:var(--sub);}
.btn-save-sheet:hover{border-color:var(--brand);color:var(--brand);}
.btn-save-sheet svg{width:18px;height:18px;}
.btn-ask-intro{
  width:100%;margin-top:8px;background:var(--surface2);border:1.5px dashed var(--border);color:var(--sub);
  border-radius:12px;padding:11px;font-size:12.5px;font-family:var(--f-body);cursor:pointer;
  transition:border-color .15s, color .15s;display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-ask-intro svg{width:14px;height:14px;}
.btn-ask-intro:hover{border-color:var(--brand);color:var(--brand);}

/* ── Intro Modal ── */
.intro-modal-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.65);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:20px;}
.intro-modal-overlay.show{display:flex;}
.intro-modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:380px;width:100%;padding:22px;animation:slideUp .2s ease;}
.intro-modal-title{font-family:var(--f-display);font-size:15px;font-weight:700;margin-bottom:4px;}
.intro-modal-sub{font-size:11px;color:var(--muted);margin-bottom:14px;}
.intro-modal-text{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:12.5px;line-height:1.7;color:var(--text);margin-bottom:14px;white-space:pre-wrap;}
.intro-modal-actions{display:flex;gap:8px;}
.btn-copy{flex:1;background:linear-gradient(120deg,var(--brand),var(--brand2));color:#1a1420;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:700;font-family:var(--f-body);cursor:pointer;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-copy.copied{background:var(--green);color:#0d0d0f;}
.btn-close-intro{background:var(--surface2);color:var(--sub);border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-size:13px;font-family:var(--f-body);cursor:pointer;}

/* ── Connect screen ── */
#screen-connect{padding:20px 16px;}
.connect-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:55vh;gap:12px;color:var(--muted);text-align:center;}
.connect-empty svg{width:42px;height:42px;opacity:.3;}
.connect-empty p{font-size:13px;line-height:1.6;}
.req-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.req-ava{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px;background:var(--surface2);flex-shrink:0;border:2px solid var(--border);}
.req-info{flex:1;min-width:0;}
.req-name{font-family:var(--f-display);font-size:14px;font-weight:700;margin-bottom:2px;}
.req-desc{font-size:11px;color:var(--sub);}
.req-actions{display:flex;gap:6px;flex-shrink:0;}
.btn-accept{background:linear-gradient(120deg,var(--brand),var(--brand2));color:#1a1420;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;font-family:var(--f-body);cursor:pointer;}
.btn-decline{background:var(--surface2);color:var(--sub);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;font-family:var(--f-body);cursor:pointer;}
.section-label{font-family:var(--f-mono);font-size:10.5px;font-weight:600;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin:20px 0 10px;}

/* ── Public referral board (D) ── */
.board-section{margin-top:24px;}
.board-toggle{
  width:100%;background:var(--surface2);border:1.5px dashed var(--border);color:var(--sub);
  border-radius:12px;padding:12px;font-size:13px;font-family:var(--f-body);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:12px;transition:border-color .15s,color .15s;
}
.board-toggle svg{width:15px;height:15px;}
.board-toggle:hover{border-color:var(--brand);color:var(--brand);}
.board-composer{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;display:none;}
.board-composer.show{display:block;}
.board-composer-label{font-size:11px;color:var(--muted);margin-bottom:8px;}
.board-cat-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.board-cat-chip{font-size:11px;padding:5px 11px;border-radius:16px;background:var(--surface2);border:1px solid var(--border);color:var(--sub);cursor:pointer;transition:all .12s;font-family:var(--f-body);}
.board-cat-chip.active{font-weight:700;}
.board-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:12.5px;font-family:var(--f-body);outline:none;margin-bottom:10px;resize:none;}
.board-input:focus{border-color:var(--brand);}
.board-input::placeholder{color:var(--muted);}
.board-submit{width:100%;background:linear-gradient(120deg,var(--brand),var(--brand2));color:#1a1420;border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:700;font-family:var(--f-body);cursor:pointer;}
.board-post{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:9px;}
.board-post-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.board-post-cat{font-size:9px;font-family:var(--f-mono);font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.3px;}
.board-post-name{font-size:11.5px;color:var(--muted);}
.board-post-note{font-size:12.5px;color:var(--text);line-height:1.5;margin-bottom:10px;}
.board-post-action{font-size:12px;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--sub);border-radius:8px;padding:7px 12px;cursor:pointer;font-family:var(--f-body);transition:all .12s;}
.board-post-action:hover{border-color:var(--brand);color:var(--brand);}
.board-post-action.done{background:rgba(74,222,128,0.12);border-color:rgba(74,222,128,0.4);color:var(--green);cursor:default;}
.board-post-status{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.board-post-status.success{color:var(--green);font-weight:600;}

/* ── Profile: starting network ── */
.my-network-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:6px;}
.net-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px 5px 5px;font-size:11.5px;color:var(--sub);}
.net-ava{width:21px;height:21px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--f-display);font-weight:700;color:var(--text);flex-shrink:0;}
.net-note{font-size:10.5px;color:var(--muted);line-height:1.5;margin-bottom:4px;}

/* ── Profile screen ── */
#screen-profile{padding:20px 16px;}
.profile-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;}
.profile-ava{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:var(--bg);flex-shrink:0;font-family:var(--f-display);}
.profile-info{flex:1;}
.profile-name{font-family:var(--f-display);font-size:18px;font-weight:700;margin-bottom:2px;}
.profile-role{font-size:13px;color:var(--sub);margin-bottom:10px;}
.profile-stats{display:flex;gap:18px;}
.stat{text-align:center;}
.stat-n{font-family:var(--f-mono);font-size:17px;font-weight:600;}
.stat-l{font-size:10px;color:var(--muted);margin-top:1px;}
.profile-bio{font-size:13px;color:var(--sub);line-height:1.7;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px;}
.open-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);color:var(--brand);font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;margin-bottom:16px;}
.open-dot{width:7px;height:7px;border-radius:50%;background:var(--brand);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.profile-empty{color:var(--muted);font-size:13px;padding:20px 0;text-align:center;line-height:1.6;}

/* ── Toast ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface3);color:var(--text);font-size:13px;padding:11px 18px;border-radius:30px;border:1px solid var(--border);z-index:500;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

<script>
// ── Category identity system ──
const CATS = {
  '設計':{c:'#FF7A59'}, '開發':{c:'#4DA3FF'}, '攝影':{c:'#FFC24D'}, '音樂':{c:'#B47AFF'},
  '表演':{c:'#FF4FA3'}, '品牌':{c:'#4DDFC4'}, '文案':{c:'#C9E94D'}, '草創':{c:'#8C8CFF'},
};
function hexToRgb(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function rgba(h,a){const[r,g,b]=hexToRgb(h);return `rgba(${r},${g},${b},${a})`;}
function darken(h,amt){const[r,g,b]=hexToRgb(h);const f=c=>Math.round(c*(1-amt));return `rgb(${f(r)},${f(g)},${f(b)})`;}
function catColor(cat){return (CATS[cat]||{c:'#8a8a96'}).c;}
function primaryColor(p){return catColor(p.cats[0]);}

// ── Connection graph + BFS (machanism B+A: paths are found through whatever
// connections already exist — including ones the platform made for you) ──
function addEdge(graph,a,b){
  if(!graph[a]) graph[a]=[];
  if(!graph[b]) graph[b]=[];
  if(!graph[a].includes(b)) graph[a].push(b);
  if(!graph[b].includes(a)) graph[b].push(a);
}
function bfsPath(graph, start, target){
  if(start===target) return [start];
  const visited = new Set([start]);
  const queue = [[start]];
  while(queue.length){
    const path = queue.shift();
    const node = path[path.length-1];
    const neighbors = graph[node] || [];
    for(const n of neighbors){
      if(visited.has(n)) continue;
      if(n===target) return path.concat([n]);
      visited.add(n);
      queue.push(path.concat([n]));
    }
  }
  return null;
}
// Seed network: who "你" already knows directly when the app starts.
// 高志明 / 吳宗翰 / 黃宇軒 are NOT direct — they're reached through 林雅婷/陳建宏,
// which is what makes the BFS path actually show a multi-hop chain below.
const NETWORK = {};
addEdge(NETWORK,'你','林雅婷');
addEdge(NETWORK,'你','陳建宏');
addEdge(NETWORK,'林雅婷','高志明');
addEdge(NETWORK,'林雅婷','黃宇軒');
addEdge(NETWORK,'陳建宏','吳宗翰');
let myDirectFriends = ['林雅婷','陳建宏'];

const PEOPLE = [
  {id:1, emoji:'🎨', name:'Ava Wu', role:'品牌視覺設計師 · 台北',
   tags:['品牌識別','插畫','草創友善'],
   bio:'幫 10+ 個台灣草創品牌從零建立視覺系統。喜歡那種還在摸索自己味道的小團隊，一起找出來很有趣。',
   works:['✏️','🎭','🖼️'], via:'林雅婷', openTo:'接案', status:'open', cats:['設計','品牌']},
  {id:2, emoji:'📸', name:'Ken Tsai', role:'商業攝影 · 台南',
   tags:['商品攝影','人像','小品牌'],
   bio:'接過超商、夜市小吃、獨立服裝品牌的拍攝案。小預算也能聊，重點是做出有感覺的東西。',
   works:['📷','🌆','👗'], via:'陳建宏', openTo:'接案', status:'full', cats:['攝影']},
  {id:3, emoji:'💻', name:'Alex Lin', role:'全端工程師 · 新竹',
   tags:['React','Node.js','MVP開發'],
   bio:'幫三個草創團隊從概念做到上線，最快六週。想找長期合作的技術合夥人角色，不只是接案。',
   works:['🛠️','📱','⚡'], via:'高志明', openTo:'合作', status:'seeking', cats:['開發']},
  {id:4, emoji:'🎵', name:'Mia Chen', role:'音樂製作人 · 台北',
   tags:['廣告配樂','獨立音樂','聲音品牌'],
   bio:'做廣告配樂也做獨立創作，正在找想一起做聲音品牌的視覺創作者或導演合作。',
   works:['🎧','🎹','🎬'], via:'吳宗翰', openTo:'合作', status:'seeking', cats:['音樂']},
  {id:5, emoji:'🎭', name:'Sam Huang', role:'街頭藝人／表演者 · 高雄',
   tags:['雜技','街頭表演','活動演出'],
   bio:'從西門町到駁二都表演過，也接企業尾牙和市集活動。有品牌想跨界合作的可以聊。',
   works:['🤹','🎪','✨'], via:'黃宇軒', openTo:'接案', status:'open', cats:['表演']},
  {id:6, emoji:'✍️', name:'Nina Fang', role:'品牌文案 · 台中',
   tags:['社群文案','品牌故事','新創'],
   bio:'專門幫那種「東西很好但不知道怎麼說」的品牌找到自己的語氣。做過食品、服裝、軟體新創。',
   works:['📝','💬','🏷️'], via:'林雅婷', openTo:'接案', status:'open', cats:['文案','品牌']},
];

const STATUS_MAP = {
  open:{label:'開放接案與合作中', cls:'open'},
  full:{label:'專案滿載，僅限交流', cls:'full'},
  seeking:{label:'尋找共同創辦人/夥伴', cls:'seeking'},
};

let liked = new Set();
let requests = [];
let activeChip = '全部';
let currentPerson = null;
let sheetList = [];
let sheetIndex = 0;

// ── Cards ──
function renderCards(people){
  const grid = document.getElementById('card-grid');
  if(!people.length){
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px 0;color:var(--muted);font-size:13px;">找不到符合條件的人才</div>`;
    return;
  }
  grid.innerHTML = people.map((p,i)=>{
    const color = primaryColor(p);
    const dark = darken(color,0.6);
    const st = STATUS_MAP[p.status];
    const heart = liked.has(p.id)
      ? `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.5-9.5-9C1 8 2.5 4.5 6 4c2.2-.3 4 1 6 3.2C14 5 15.8 3.7 18 4c3.5.5 5 4 3.5 8-2 4.5-9.5 9-9.5 9z"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7.5-4.5-9.5-9C1 8 2.5 4.5 6 4c2.2-.3 4 1 6 3.2C14 5 15.8 3.7 18 4c3.5.5 5 4 3.5 8-2 4.5-9.5 9-9.5 9z"/></svg>`;
    return `
    <div class="pcard" style="animation-delay:${i*0.04}s" onclick="openSheet(${p.id})">
      <div class="pcard-cover" style="background:linear-gradient(135deg, ${color} 0%, ${dark} 100%)">
        <div class="pcard-dots"></div>
        <div class="status-badge ${st.cls}"><span class="status-dot ${st.cls}"></span>${st.label}</div>
        <div class="btn-like${liked.has(p.id)?' liked':''}" onclick="toggleLike(event,${p.id})">${heart}</div>
        <div class="pcard-avatar" style="border-color:${color};background:${rgba(color,0.25)};box-shadow:0 4px 14px ${rgba(color,0.4)}">${p.emoji}</div>
      </div>
      <div class="pcard-body">
        <div class="pcard-name">${p.name}</div>
        <div class="pcard-role">${p.role}</div>
        <div class="pcard-ref-chip"><span class="ref-tag-mono">REF</span><span class="name">${p.via}</span></div>
        <div class="pcard-tags">
          ${p.tags.map((t,ti)=>`<span class="ptag${ti===0?' hot':''}" ${ti===0?`style="color:${color};background:${rgba(color,0.15)}"`:''}>${t}</span>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
}

function getFiltered(){
  let list = PEOPLE;
  const q = document.getElementById('search-inp').value.trim().toLowerCase();
  if(activeChip!=='全部') list = list.filter(p=>p.cats.includes(activeChip));
  if(q) list = list.filter(p=>(p.name+p.role+p.tags.join('')+p.bio).toLowerCase().includes(q));
  return list;
}

function setChip(el,cat){
  document.querySelectorAll('.chip').forEach(c=>{c.classList.remove('active');c.style.background='';c.style.borderColor='';c.style.color='';});
  el.classList.add('active');
  if(cat==='全部'){
    el.style.background='rgba(255,107,107,0.12)';el.style.borderColor='var(--brand)';el.style.color='var(--brand)';
  } else {
    const c = catColor(cat);
    el.style.background=rgba(c,0.14);el.style.borderColor=c;el.style.color=c;
  }
  activeChip = cat;
  renderCards(getFiltered());
}

function filterCards(q){ renderCards(getFiltered()); }

// ── Sheet ──
function openSheet(id){
  sheetList = getFiltered();
  sheetIndex = sheetList.findIndex(x=>x.id===id);
  if(sheetIndex < 0) sheetIndex = 0;
  renderSheet();
  document.getElementById('sheet-overlay').classList.add('show');
  document.body.style.overflow='hidden';
}

function renderSheet(){
  const p = sheetList[sheetIndex];
  if(!p) return;
  currentPerson = p;
  const color = primaryColor(p);
  const dark = darken(color,0.6);
  document.getElementById('s-cover').innerHTML = `<div style="position:absolute;inset:0;background:linear-gradient(135deg,${color} 0%,${dark} 100%)"></div><div class="pcard-dots" style="opacity:.35"></div><div style="position:relative;z-index:1;">${p.emoji}</div>`;
  document.getElementById('s-name').textContent = p.name;
  document.getElementById('s-role').textContent = p.role;
  const st = STATUS_MAP[p.status];
  document.getElementById('s-status').innerHTML = `<div class="status-badge ${st.cls}" style="position:static;display:inline-flex;"><span class="status-dot ${st.cls}"></span>${st.label}</div>`;
  document.getElementById('s-tags').innerHTML = p.tags.map((t,i)=>`<span class="sheet-tag" ${i===0?`style="color:${color};background:${rgba(color,0.15)}"`:''}>${t}</span>`).join('');
  document.getElementById('s-bio').textContent = p.bio;
  document.getElementById('s-works').innerHTML = p.works.map(w=>`<div class="work-thumb">${w}</div>`).join('');

  const path = bfsPath(NETWORK, '你', p.via) || ['你', p.via];
  const hops = path.length - 2; // intermediate connectors beyond the direct via-friend
  const nodeCols = path.map((name,idx)=>{
    if(idx===0) return `<div class="chain-col"><div class="chain-node you">你</div><div class="chain-node-label">你</div></div>`;
    return `<div class="chain-col"><div class="chain-node" style="border-color:var(--muted)">${name[0]}</div><div class="chain-node-label">${name}</div></div>`;
  });
  nodeCols.push(`<div class="chain-col"><div class="chain-node" style="border-color:${color};background:${rgba(color,0.18)}">${p.emoji}</div><div class="chain-node-label">${p.name}</div></div>`);
  const hopTag = hops<=0 ? '直接朋友引薦' : `透過 ${hops} 位朋友的朋友連結（系統幫你找的最短路徑）`;
  document.getElementById('s-chain').innerHTML = `
    <div class="chain-path">${nodeCols.join('<div class="chain-line"></div>')}</div>
    <div class="chain-hop-tag">${hopTag}</div>
    <div class="chain-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      對方確認後才會公開聯絡方式，你不需要直接認識整條鏈上的每一個人
    </div>`;

  const maxDots = 8;
  const prog = document.getElementById('s-progress');
  if(sheetList.length <= 1){ prog.innerHTML=''; }
  else if(sheetList.length <= maxDots){
    prog.innerHTML = sheetList.map((_,i)=>`<div class="sheet-progress-dot${i===sheetIndex?' active':''}"></div>`).join('');
  } else {
    prog.innerHTML = `<div style="font-family:var(--f-mono);font-size:11px;color:var(--muted)">${sheetIndex+1} / ${sheetList.length}</div>`;
  }
  document.getElementById('s-nav-prev').classList.toggle('disabled', sheetIndex<=0);
  document.getElementById('s-nav-next').classList.toggle('disabled', sheetIndex>=sheetList.length-1);
  document.getElementById('sheet').scrollTop = 0;
}

function navSheet(dir){
  const next = sheetIndex + dir;
  if(next < 0 || next >= sheetList.length) return;
  sheetIndex = next;
  const sheetEl = document.getElementById('sheet');
  sheetEl.style.transition = 'opacity .12s';
  sheetEl.style.opacity = '0';
  setTimeout(()=>{ renderSheet(); sheetEl.style.opacity = '1'; }, 120);
}

function closeSheet(e){
  if(!e || e.target===document.getElementById('sheet-overlay')){
    document.getElementById('sheet-overlay').classList.remove('show');
    document.body.style.overflow='';
  }
}

function sendRequest(){
  if(!currentPerson) return;
  requests.push(currentPerson);
  renderRequests();
  closeSheet();
  showToast(`已向 ${currentPerson.name} 發送引薦請求`);
  document.getElementById('nav-connect-dot').classList.add('show');
}

function saveCard(){ showToast('已收藏'); }

// ── Ask for Intro Modal ──
function buildIntroText(p){
  const templates = [
    `嗨！我在 Nexus5 上看到你推薦的 ${p.name}（${p.role}），覺得他的「${p.tags[0]}」滿吸引我的 👀\n\n可以幫我引薦一下嗎？不會佔用你太多時間，我自己會直接跟他聊～先謝謝你！`,
    `欸欸，我在找 ${p.tags[0]} 相關的人，剛好看到 ${p.name} 是你推薦的強者朋友 🙌\n\n方便幫我牽個線嗎？我保證不會煩你，聊完就自己跟他對接！`,
    `Hi～我在 Nexus5 上看到 ${p.name}，覺得跟我現在在做的事很match（${p.tags.slice(0,2).join('、')}）\n\n聽說你們認識，可以幫忙引薦一下嗎？感激不盡 🙏`,
  ];
  return templates[p.id % templates.length];
}

function openIntroModal(){
  if(!currentPerson) return;
  document.getElementById('intro-modal-text').textContent = buildIntroText(currentPerson);
  const btn = document.getElementById('btn-copy-intro');
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 一鍵複製`;
  btn.classList.remove('copied');
  document.getElementById('intro-modal-overlay').classList.add('show');
}

function closeIntroModal(e){
  if(!e || e.target===document.getElementById('intro-modal-overlay')){
    document.getElementById('intro-modal-overlay').classList.remove('show');
  }
}

function copyIntroText(){
  const text = document.getElementById('intro-modal-text').textContent;
  const btn = document.getElementById('btn-copy-intro');
  const doFallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); }catch(err){}
    document.body.removeChild(ta);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(doFallback);
  } else { doFallback(); }
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M20 6L9 17l-5-5"/></svg> 已複製`;
  btn.classList.add('copied');
  setTimeout(()=>{
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 一鍵複製`;
    btn.classList.remove('copied');
  }, 2000);
}

// ── Like ──
function toggleLike(e,id){
  e.stopPropagation();
  const btn = e.currentTarget;
  if(liked.has(id)){
    liked.delete(id); btn.classList.remove('liked');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7.5-4.5-9.5-9C1 8 2.5 4.5 6 4c2.2-.3 4 1 6 3.2C14 5 15.8 3.7 18 4c3.5.5 5 4 3.5 8-2 4.5-9.5 9-9.5 9z"/></svg>`;
  } else {
    liked.add(id); btn.classList.add('liked');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.5-9.5-9C1 8 2.5 4.5 6 4c2.2-.3 4 1 6 3.2C14 5 15.8 3.7 18 4c3.5.5 5 4 3.5 8-2 4.5-9.5 9-9.5 9z"/></svg>`;
    showToast('已標記感興趣');
  }
}

// ── Requests ──
function renderRequests(){
  const list = document.getElementById('req-list');
  const empty = document.getElementById('connect-empty');
  if(!requests.length){ list.innerHTML=''; empty.style.display='flex'; return; }
  empty.style.display='none';
  list.innerHTML = requests.map((p,i)=>{
    const color = primaryColor(p);
    return `
    <div class="req-card" id="req-${i}">
      <div class="req-ava" style="border-color:${color};background:${rgba(color,0.18)}">${p.emoji}</div>
      <div class="req-info">
        <div class="req-name">${p.name}</div>
        <div class="req-desc">${p.role} · ${p.via} 推薦</div>
      </div>
      <div class="req-actions">
        <button class="btn-accept" onclick="acceptReq(${i})">確認</button>
        <button class="btn-decline" onclick="declineReq(${i})">拒絕</button>
      </div>
    </div>`;
  }).join('');
}

// ── My network (grows with every accepted connection — this is what shortens
// future BFS paths for everyone reached through you) ──
function renderMyNetwork(){
  document.getElementById('my-conn-count').textContent = myDirectFriends.length;
  document.getElementById('my-network-chips').innerHTML = myDirectFriends.map((name,i)=>
    `<div class="net-chip">${i<2?'🧊 ':''}<span class="net-ava">${name[0]}</span>${name}</div>`
  ).join('');
}

function acceptReq(i){
  const p = requests[i];
  addEdge(NETWORK, '你', p.name);
  if(!myDirectFriends.includes(p.name)) myDirectFriends.push(p.name);
  renderMyNetwork();
  showToast(`🎉 成功與 ${p.name} 建立連結！你的人脈圖更新了`);
  requests.splice(i,1);
  renderRequests();
  if(!requests.length) document.getElementById('nav-connect-dot').classList.remove('show');
}

function declineReq(i){
  requests.splice(i,1);
  renderRequests();
  if(!requests.length) document.getElementById('nav-connect-dot').classList.remove('show');
}

// ── Nav ──
function switchTab(tab){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  if(tab==='connect') renderRequests();
}

// ── Public referral board (D) — a low-pressure fallback: no one has to
// open their mouth and ask a specific friend. Post once, wait passively. ──
let boardPosts = [
  {id:1, name:'匿名創業者', cat:'開發', note:'準備找技術夥伴，想認識熟 React Native 的工程師，新竹附近優先', mine:false, status:'open'},
  {id:2, name:'匿名創作者', cat:'攝影', note:'想找願意拍人像作品集的攝影師合作，預算另外談', mine:false, status:'open'},
];
let boardSelectedCat = '設計';
let boardIdSeq = 100;

function renderBoardChips(){
  document.getElementById('board-cat-chips').innerHTML = Object.keys(CATS).map(cat=>{
    const active = cat===boardSelectedCat;
    const c = catColor(cat);
    return `<button class="board-cat-chip${active?' active':''}" style="${active?`background:${rgba(c,0.16)};border-color:${c};color:${c}`:''}" onclick="selectBoardCat('${cat}')">${cat}</button>`;
  }).join('');
}
function selectBoardCat(cat){ boardSelectedCat = cat; renderBoardChips(); }
function toggleComposer(){ document.getElementById('board-composer').classList.toggle('show'); }

function submitBoardPost(){
  const note = document.getElementById('board-note').value.trim();
  const post = {id: boardIdSeq++, cat:boardSelectedCat, note: note || `想認識做${boardSelectedCat}的人`, mine:true, status:'pending'};
  boardPosts.unshift(post);
  document.getElementById('board-note').value='';
  document.getElementById('board-composer').classList.remove('show');
  renderBoard();
  showToast('已公開發佈，等有緣人看到 🌱');
  const respondersPool = ['林雅婷的朋友','社群裡的陌生人','陳建宏'];
  setTimeout(()=>{
    const target = boardPosts.find(b=>b.id===post.id);
    if(!target) return;
    target.status='matched';
    target.responder = respondersPool[Math.floor(Math.random()*respondersPool.length)];
    renderBoard();
    showToast(`🎉 ${target.responder} 願意幫你引薦！`);
  }, 5000);
}

function respondBoard(id){
  const post = boardPosts.find(b=>b.id===id);
  if(!post || post.status==='done') return;
  post.status='done';
  renderBoard();
  showToast('已私訊對方，謝謝你幫忙牽線 🙌');
}

function renderBoard(){
  document.getElementById('board-list').innerHTML = boardPosts.map(post=>{
    const c = catColor(post.cat);
    let actionHtml;
    if(post.mine){
      actionHtml = post.status==='pending'
        ? `<div class="board-post-status">⏳ 等待社群回應…</div>`
        : `<div class="board-post-status success">🎉 ${post.responder} 願意幫你引薦</div>`;
    } else {
      actionHtml = post.status==='done'
        ? `<button class="board-post-action done">已回應，謝謝你</button>`
        : `<button class="board-post-action" onclick="respondBoard(${post.id})">我可以幫忙引薦</button>`;
    }
    return `
    <div class="board-post">
      <div class="board-post-top">
        <span class="board-post-cat" style="background:${rgba(c,0.15)};color:${c}">${post.cat}</span>
        <span class="board-post-name">${post.mine?'你':post.name}</span>
      </div>
      <div class="board-post-note">${post.note}</div>
      ${actionHtml}
    </div>`;
  }).join('');
}

// ── Toast ──
let tt;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(tt); tt = setTimeout(()=>t.classList.remove('show'),2500);
}

// Init
renderCards(PEOPLE);
renderRequests();
renderMyNetwork();
renderBoardChips();
renderBoard();

setTimeout(()=>{ document.getElementById('loading-screen').classList.add('fade-out'); }, 1300);

// ── Touch swipe on sheet ──
(function(){
  const sheet = document.getElementById('sheet');
  let startX=0, startY=0, tracking=false;
  sheet.addEventListener('touchstart', e=>{
    startX = e.touches[0].clientX; startY = e.touches[0].clientY; tracking = true;
  }, {passive:true});
  sheet.addEventListener('touchend', e=>{
    if(!tracking) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){
      navSheet(dx < 0 ? 1 : -1);
    }
    tracking = false;
  }, {passive:true});
})();
</script>
